<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опитування завершено</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; color: #111827; line-height: 1.55; }
        h1 { font-size: 1.6rem; margin-bottom: 16px; }
        p { margin: 10px 0; }
        .note { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 14px; margin: 18px 0; }
        .success { padding: 16px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; color: #166534; margin: 24px 0; }
        button { margin-top: 16px; padding: 10px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <h1>Дякуємо за проходження опитування</h1>

    <div class="success">
        <p><strong>{{ success_message }}</strong></p>
    </div>

    {% if show_feedback_offer %}
    <div class="note">
        <p><strong>Ви вже заповнили {{ completed_screenings_count }} опитувань.</strong></p>
        <p>Після завершення цього етапу Ви також можете пройти форму оцінки використання застосунку.</p>
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <button type="submit">Продовжити</button>
    </form>
</body>
</html>
